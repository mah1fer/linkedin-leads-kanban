<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kanban Bridge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 240px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #ffffff;
    color: #111827;
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo {
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.18);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .header-info { flex: 1; }
  .header-title { color: #fff; font-size: 14px; font-weight: 700; }
  .header-sub { color: rgba(255,255,255,0.65); font-size: 10px; margin-top: 1px; }
  .body { padding: 14px; }
  .status-card {
    background: #f9fafb;
    border-radius: 10px;
    padding: 12px;
    border: 1px solid #f3f4f6;
    margin-bottom: 12px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .status-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
  .status-text { flex: 1; }
  .status-label { font-size: 11px; font-weight: 700; color: #374151; }
  .status-desc { font-size: 10.5px; color: #6b7280; margin-top: 3px; line-height: 1.4; }
  .tip {
    font-size: 10.5px;
    color: #9ca3af;
    text-align: center;
    line-height: 1.5;
  }
  .tip strong { color: #7c3aed; }
  .divider { height: 1px; background: #f3f4f6; margin: 10px 0; }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">🔗</div>
    <div class="header-info">
      <div class="header-title">Kanban Bridge</div>
      <div class="header-sub">v2.0 — LinkedIn Scraper</div>
    </div>
  </div>
  <div class="body">
    <div class="status-card" id="status-card">
      <div class="status-icon" id="status-icon">🔍</div>
      <div class="status-text">
        <div class="status-label" id="status-label">Verificando...</div>
        <div class="status-desc" id="status-desc">Aguarde um momento.</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="tip">
      Abra um perfil no LinkedIn para ver o painel <strong>Kanban Bridge</strong> aparecer automaticamente.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
