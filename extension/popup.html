<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kanban Bridge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 260px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #ffffff;
    color: #111827;
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo {
    width: 30px; height: 30px;
    background: rgba(255,255,255,0.18);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-title { color: #fff; font-size: 13px; font-weight: 700; }
  .header-sub { color: rgba(255,255,255,0.65); font-size: 10px; margin-top: 1px; }
  .body { padding: 12px 14px; }
  .status-card {
    background: #f9fafb;
    border-radius: 10px;
    padding: 10px 12px;
    border: 1px solid #f3f4f6;
    margin-bottom: 12px;
    display: flex;
    align-items: flex-start;
    gap: 9px;
  }
  .status-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .status-text { flex: 1; }
  .status-label { font-size: 11px; font-weight: 700; color: #374151; }
  .status-desc { font-size: 10px; color: #6b7280; margin-top: 3px; line-height: 1.4; }
  .divider { height: 1px; background: #f3f4f6; margin: 10px 0; }
  .section-label {
    font-size: 10px;
    font-weight: 700;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .url-row { display: flex; gap: 6px; }
  .url-input {
    flex: 1;
    font-size: 11px;
    padding: 6px 8px;
    border: 1px solid #e5e7eb;
    border-radius: 7px;
    outline: none;
    color: #374151;
    background: #f9fafb;
    transition: border-color 0.15s;
  }
  .url-input:focus { border-color: #7c3aed; background: #fff; }
  .save-btn {
    font-size: 11px;
    font-weight: 700;
    padding: 6px 10px;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: #fff;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .save-btn:hover { opacity: 0.85; }
  .save-feedback {
    font-size: 10px;
    color: #059669;
    margin-top: 4px;
    display: none;
  }
  .tip {
    font-size: 10px;
    color: #9ca3af;
    text-align: center;
    line-height: 1.5;
    margin-top: 10px;
  }
  .tip strong { color: #7c3aed; }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">🔗</div>
    <div class="header-info">
      <div class="header-title">Kanban Bridge</div>
      <div class="header-sub">v2.1 — LinkedIn Scraper</div>
    </div>
  </div>
  <div class="body">
    <div class="status-card" id="status-card">
      <div class="status-icon" id="status-icon">🔍</div>
      <div class="status-text">
        <div class="status-label" id="status-label">Verificando...</div>
        <div class="status-desc" id="status-desc">Aguarde um momento.</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-label">URL do App Kanban</div>
    <div class="url-row">
      <input
        type="text"
        class="url-input"
        id="url-input"
        placeholder="https://seu-app.vercel.app"
      />
      <button class="save-btn" id="save-btn">Salvar</button>
    </div>
    <div class="save-feedback" id="save-feedback">✅ URL salva!</div>

    <div class="tip">
      Abra um perfil no LinkedIn para ver o painel <strong>Kanban Bridge</strong> aparecer.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
